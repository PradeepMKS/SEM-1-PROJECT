<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passed-Out Student Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Passed-Out Student Tracker</h1>

    <section class="form-section">
      <h2>Add / Edit Student</h2>
      <form id="studentForm">
        <input type="hidden" id="studentId" />

        <label>Name <span>*</span></label>
        <input type="text" id="name" required />

        <label>Graduation Year</label>
        <input type="number" id="graduationYear" min="1900" max="2100" />

        <label>Department</label>
        <input type="text" id="department" />

        <label>Status <span>*</span></label>
        <select id="status" required>
          <option value="">Select status</option>
          <option value="working">Working</option>
          <option value="higher_studies">Higher Studies</option>
          <option value="business">Business</option>
        </select>

        <label>Organization / College / Business</label>
        <input type="text" id="organization" />

        <label>Position / Course / Role</label>
        <input type="text" id="position" />

        <label>Location</label>
        <input type="text" id="location" />

        <label>Notes</label>
        <textarea id="notes" rows="3"></textarea>

        <button type="submit">Save</button>
        <button type="button" id="resetBtn">Reset</button>
      </form>
    </section>

    <section class="table-section">
      <h2>All Students</h2>
      <div class="filters">
        <input type="text" id="searchText" placeholder="Search by name or org" />
        <select id="filterStatus">
          <option value="">All statuses</option>
          <option value="working">Working</option>
          <option value="higher_studies">Higher Studies</option>
          <option value="business">Business</option>
        </select>
        <button id="filterBtn">Filter</button>
      </div>

      <table id="studentsTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Year</th>
            <th>Dept</th>
            <th>Status</th>
            <th>Org</th>
            <th>Position</th>
            <th>Location</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
